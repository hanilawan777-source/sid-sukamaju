<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Desa Sukamaju</div>
        <nav>
            <ul>
                <li><a href="index.html">Beranda</a></li>
                <li><a href="profil.html">Profil Desa</a></li>
                <li><a href="layanan.html">Layanan</a></li>
                <li><a href="login.html">Login Admin</a></li>
            </ul>
        </nav>
    </header>

    <div class="container section-padding">
        <h2>Permohonan Surat Online</h2>
        
        <div class="form-box">
            <form id="formSurat">
                <div class="form-group">
                    <label for="nik">NIK</label>
                    <input type="number" id="nik" required>
                </div>
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" required>
                </div>
                <div class="form-group">
                    <label for="jenisSurat">Jenis Surat</label>
                    <select id="jenisSurat" required>
                        <option value=""></option>
                        <option value="Surat Pengantar SKCK">Surat Pengantar SKCK</option>
                        <option value="Surat Keterangan Domisili">Surat Keterangan Domisili</option>
                        <option value="Surat Keterangan Tidak Mampu">Surat Keterangan Tidak Mampu</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Kirim Permohonan</button>
            </form>
            <div id="notifikasi" class="notif" style="display: none;"></div>
        </div>
    </div>
